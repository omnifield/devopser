# Publish devbox-образа → GHCR (briefs/docker-dev-environment.md D2).
# Запуск руками: gh workflow run release-devbox.yml [-f tag=vYYYY.MM.DD]
# Теги: датированный vYYYY.MM.DD + latest. Без input'а — UTC-дата раннера;
# ⚠️ пин в devcontainer-шаблоне ОБЯЗАН совпадать с фактически изданным тегом
# (грабля Д1 фидбека brainer: локальная дата ≠ UTC → пин на несуществующий тег).
name: Release devbox image

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Явный тег (vYYYY.MM.DD); пусто = UTC-дата раннера'
        type: string
        required: false
        default: ''

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: tag
        run: |
          TAG="${{ inputs.tag }}"
          echo "value=${TAG:-v$(date -u +%Y.%m.%d)}" >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@v7
        with:
          context: devbox
          push: true
          tags: |
            ghcr.io/omnifield/devbox:${{ steps.tag.outputs.value }}
            ghcr.io/omnifield/devbox:latest
