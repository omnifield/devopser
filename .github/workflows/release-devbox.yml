# Publish devbox-образа → GHCR (briefs/docker-dev-environment.md D2).
# Запуск руками: gh workflow run release-devbox.yml
# Теги: датированный vYYYY.MM.DD (его пинят .devcontainer репо) + latest.
name: Release devbox image

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: tag
        run: echo "value=v$(date +%Y.%m.%d)" >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@v6
        with:
          context: devbox
          push: true
          tags: |
            ghcr.io/omnifield/devbox:${{ steps.tag.outputs.value }}
            ghcr.io/omnifield/devbox:latest
