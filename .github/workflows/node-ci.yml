# Reusable CI для node-репо экосистемы (repo-skeleton D1, briefs/repo-skeleton-product.md).
# Потребитель держит ~5-строчный caller:
#   uses: omnifield/devopser/.github/workflows/node-ci.yml@main
# Сниппеты caller'ов и грабли — README.md рядом.
#
# Версии тулчейна — ТОЛЬКО из пинов репо-вызывателя (канон toolchain-pins):
#   pnpm — packageManager в package.json (pnpm/action-setup без version);
#   node — engines.node в package.json (node-version-file, диапазон ок).
#
# permissions задаёт CALLER — reusable не может расширить права сам:
#   contents: read, actions: read; без actions:read nx-set-shas падает
#   «Resource not accessible by integration» (грабля weber, 2026-07-09).
name: Node CI (reusable)

on:
  workflow_call:
    inputs:
      drift-check:
        description: 'Сверка вендоренных skeleton-копий с эталоном devopser (D3); выключать только на переходный период'
        type: boolean
        required: false
        default: true
      secret-scan:
        description: 'gitleaks по всей git-истории (репо публичные — токены ловит CI); выключать только с решением architect'
        type: boolean
        required: false
        default: true

jobs:
  node:
    name: Node (hygiene + nx affected lint/typecheck/test/build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # nx affected диффится от базы — нужна полная история (нужна и gitleaks).
          fetch-depth: 0
      # Репо публичные: секреты в вечной истории ловит CI, не глаза. --redact —
      # находки не светятся в логах. Версия запинена (канон toolchain-pins).
      - name: secret-scan (gitleaks)
        if: ${{ inputs.secret-scan }}
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz \
            | tar -xz -C /tmp gitleaks
          /tmp/gitleaks detect --source . --redact --no-banner
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: package.json
          cache: pnpm
          # user-level .npmrc с токеном под @omnifield-пакеты (GitHub Packages).
          registry-url: https://npm.pkg.github.com
          scope: '@omnifield'
      - run: pnpm install --frozen-lockfile
        env:
          # Чтение @omnifield-пакетов; пакету devopser нужен grant на репо-вызыватель
          # (Package settings → Manage Actions access) — см. README.
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # Монорепо-гигиена: рассинхрон версий deps между пакетами.
      - run: pnpm sherif
      - uses: nrwl/nx-set-shas@v5
      - run: pnpm nx affected -t lint,typecheck,test,build
      # D3: дрейф вендоренных skeleton-копий виден сразу (красный);
      # синк — явной командой init.mjs, не молча.
      - name: skeleton drift-check
        if: ${{ inputs.drift-check }}
        uses: omnifield/devopser/.github/actions/drift-check@main
