# Reusable semantic-гейт заголовка PR (repo-skeleton D1). Squash-merge берёт
# заголовок PR как commit subject — сигнал должен быть машиночитаемым
# (канон commit-каденса). Caller задаёт permissions: {pull-requests: read}.
name: PR title (reusable)

on:
  workflow_call:
    inputs:
      types:
        description: 'Разрешённые Conventional Commits типы (по одному на строку)'
        type: string
        required: false
        default: |
          feat
          fix
          refactor
          docs
          chore
          build
          ci

jobs:
  semantic:
    name: Semantic PR title
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: ${{ inputs.types }}
