# Маршруты dev-gateway (briefs/gateway-hub-single-origin.md).
# Порт-контракты targets — registry/ports.md; менять порт/маршрут = контракт
# (потребители!) — только через architect + запись в registry.

server {
    listen 80;
    server_name _;
    charset utf-8;

    # --- хаб: одна точка входа --------------------------------------------
    root /usr/share/nginx/html;
    index index.html;

    # --- brainer frontend (vite dev за префиксом; base='/brainer/' — на их
    # стороне, owner-frontend). До исполнения их порт-контракта отвечает 502 —
    # ожидаемо (бриф: gateway поднимается первым).
    location /brainer/ {
        proxy_pass http://host.docker.internal:3500;
        # HMR websocket — без Upgrade/Connection vite-dev мёртв
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # websocket живёт дольше дефолтных 60 s
        proxy_read_timeout 1h;
    }

    # --- weber sandbox (vite dev за префиксом; base='/sandbox/' на стороне
    # weber). Полигон фреймворка; отвечает 502, когда dev-сервер не поднят —
    # ожидаемо (поднимается из weber-devbox).
    location /sandbox/ {
        proxy_pass http://host.docker.internal:5173;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 1h;
    }

    # --- brainer backend (нативный префикс /brainer/ у бэка — owner-backend)
    location /api/brainer/ {
        proxy_pass http://host.docker.internal:8010/brainer/;
        # SSE (/stream): буферизация убивает стрим; таймаут — стримы висят долго
        proxy_buffering off;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 1h;
    }

    # --- observability (фаза 2, целевое состояние — за тем же origin):
    # Grafana /grafana/ (нужен GF_SERVER_ROOT_URL) и Prometheus /prometheus/
    # (--web.external-url) требуют env-правок в стеке-владельце (капсула
    # оракула, интерим) — до их заказа хаб ссылается на порты напрямую.
}
