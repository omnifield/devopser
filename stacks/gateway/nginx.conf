# Маршруты dev-gateway (briefs/gateway-hub-single-origin.md +
# gateway-network-single-origin.md). Апстримы — по docker-сети omnifield-gateway
# (alias = network-alias продукт-devbox'а = имя репо), НЕ host.docker.internal,
# НЕ per-service -p. Наружу — только :8080. Порт-контракты targets —
# registry/ports.md; менять порт/маршрут = контракт (через architect + registry).

# docker embedded DNS. Резолв alias'ов в RUNTIME (valid=10s) — через переменную в
# proxy_pass, иначе nginx резолвит имя на старте и падает/кэширует NXDOMAIN, когда
# продукт-devbox ещё не поднят (gateway-network-single-origin.md §resolver-gotcha).
# Так gateway стартует первым и подхватывает продукт, когда тот появится.
resolver 127.0.0.11 valid=10s ipv6=off;

server {
    listen 80;
    server_name _;
    charset utf-8;

    # --- хаб: одна точка входа --------------------------------------------
    root /usr/share/nginx/html;
    index index.html;

    # --- brainer frontend (vite dev за префиксом; base='/brainer/' — их сторона).
    # alias brainer = network-alias brainer-devbox. Продукт не поднят → 502
    # (ожидаемо, gateway первым).
    location /brainer/ {
        set $up_brainer brainer;
        proxy_pass http://$up_brainer:3500;
        # HMR websocket — без Upgrade/Connection vite-dev мёртв
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # websocket живёт дольше дефолтных 60 s
        proxy_read_timeout 1h;
    }

    # --- weber sandbox (vite dev за префиксом; base='/sandbox/' на стороне weber).
    location /sandbox/ {
        set $up_weber weber;
        proxy_pass http://$up_weber:5173;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 1h;
    }

    # --- brainer backend (нативный префикс /brainer/ у бэка — owner-backend).
    # variable-proxy_pass НЕ делает авто-replace префикса location → rewrite…break
    # переписывает /api/brainer/… → /brainer/… (эквивалент прежнего proxy_pass …/brainer/).
    location /api/brainer/ {
        set $up_brainer_api brainer;
        rewrite ^/api/brainer/(.*)$ /brainer/$1 break;
        proxy_pass http://$up_brainer_api:8010;
        # SSE (/stream): буферизация убивает стрим; таймаут — стримы висят долго
        proxy_buffering off;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 1h;
    }

    # --- observability (фаза 2, целевое состояние — за тем же origin):
    # Grafana /grafana/ (нужен GF_SERVER_ROOT_URL) и Prometheus /prometheus/
    # (--web.external-url) требуют env-правок в стеке-владельце (капсула
    # оракула, интерим) — до их заказа хаб ссылается на порты напрямую.
}
