# dev-gateway — single-origin вход dev-машины + хаб
# (gateway-hub-single-origin.md + gateway-network-single-origin.md).
#
# Пререквизит — внешняя сеть (один раз на машину; devbox'ы создают её сами через
# initializeCommand, для standalone-compose создай явно):
#   docker network create omnifield-gateway
# Запуск:  docker compose up -d   (из этой директории)
# Вход:    http://localhost:8080/ — хаб; маршруты — nginx.conf.
#
# Порт 8080 — ЕДИНСТВЕННАЯ хост-публикация всей системы (registry/ports.md; контракт).
# Апстримы продуктов (brainer:3500/8010, weber:5173) — по docker-сети
# omnifield-gateway, alias = network-alias продукт-devbox'а (= имя репо); НЕ
# host.docker.internal и НЕ per-service -p (gateway-network-single-origin.md).
services:
  gateway:
    image: nginx:1.29-alpine
    container_name: omnifield-gateway
    restart: unless-stopped
    ports:
      - "8080:80"
    networks:
      - omnifield-gateway
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./hub:/usr/share/nginx/html:ro

networks:
  omnifield-gateway:
    external: true
