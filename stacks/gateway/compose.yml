# dev-gateway — single-origin вход dev-машины + хаб
# (briefs/gateway-hub-single-origin.md; заказчик — brainer, решение user:
# прямые порты уходят из рабочего флоу, dev = тот же nginx-флоу, что прод).
#
# Запуск:  docker compose up -d   (из этой директории)
# Вход:    http://localhost:8080/ — хаб; маршруты — nginx.conf.
# Порт 8080 — registry/ports.md (контракт; переехал из капсулы оракула).
#
# Порты продуктов (3500/8010, …) — ВНУТРЕННЯЯ деталь (nginx targets):
# в UX/доках не фигурируют, source of truth — registry/ports.md.
services:
  gateway:
    image: nginx:1.29-alpine
    container_name: omnifield-gateway
    restart: unless-stopped
    ports:
      - "8080:80"
    extra_hosts:
      # linux-parity; Docker Desktop даёт host.docker.internal и так (П-докер-1)
      - "host.docker.internal:host-gateway"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./hub:/usr/share/nginx/html:ro
