# Publish @omnifield/* → GitHub Packages. Запуск руками (workflow_dispatch):
#   gh workflow run release.yml
# GITHUB_TOKEN c packages:write публикует пакеты своего репо — PAT не нужен.
#
# УНИВЕРСАЛЬНАЯ, root-agnostic (kb:ADR-17): ОДНА форма на любой рут-стек (go / node / python /
# полиглот). Материализуется в ЛЮБОЙ репо БЕЗ стек-гейта — нет публикуемых пакетов → зелёный
# no-op. node здесь — РАНТАЙМ публикации (версия пиннится явно, НЕ node-version-file из корня),
# pnpm пиннится в workflow — корневой package.json/pnpm-lock НЕ требуется (пакет может жить в
# подпапке go-корня). Publish ИДЕМПОТЕНТЕН (DEVOPSER-132): новые версии выкатываются, уже
# опубликованные пропускаются с логом (не роняют джобу) — партиал-бамп ок.
name: Release packages

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 10 # пин рантайма публикации (root-agnostic: без корневого packageManager)
      - uses: actions/setup-node@v6
        with:
          node-version: 22 # рантайм публикации, НЕ node-version-file из корня (kb:ADR-17)
          registry-url: https://npm.pkg.github.com
          scope: '@omnifield'
      # Скан ПО ПАКЕТАМ (не по корню): издаёт все @omnifield/* не-private где бы ни лежали,
      # каждый идемпотентно (дубликат → skip). Нет пакетов → no-op. Корневой install не нужен.
      - run: node scripts/publish-idempotent.mjs
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
