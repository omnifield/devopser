# Канон-форма sqlc для go-продукта (schema v2). Вендорится копией; продукт правит
# пути под свою структуру — reusable go-ci.yml читает ИМЕННО этот файл вызывателя,
# в CI пины версии sqlc — в шапке go-ci.yml (tools), не тут.
#
# Пути ниже — канон-layout go-сервиса (migrations/ · internal/), не имя продукта:
# продукт меняет их под себя, механизм на них не завязан.
#
# БД = конфиг продукта (knowledger go.md §Данные): дефолт — sqlite (тесты на реальном
# SQLite, продукты — sqlite). postgres — drop-in-таргет: engine: "postgresql" +
# gen.go.sql_package: "pgx/v5", остальное без правок.
version: "2"
sql:
  - engine: "sqlite"
    schema: "migrations"                 # каталог goose-миграций (канон-layout)
    queries: "internal/store/queries"    # *.sql с аннотациями sqlc
    gen:
      go:
        package: "store"
        out: "internal/store"
