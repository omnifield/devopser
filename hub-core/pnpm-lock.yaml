lockfileVersion: '9.0'

settings:
  autoInstallPeers: true
  excludeLinksFromLockfile: false

importers:

  .:
    dependencies:
      '@omnifield/contract-manifest':
        specifier: file:./vendor/@omnifield/contract-manifest
        version: file:vendor/@omnifield/contract-manifest
      yaml:
        specifier: ^2.6.1
        version: 2.9.0
      zod:
        specifier: ^3.23.8
        version: 3.25.76

packages:

  '@omnifield/contract-manifest@file:vendor/@omnifield/contract-manifest':
    resolution: {directory: vendor/@omnifield/contract-manifest, type: directory}
    engines: {node: '>=22.18'}

  yaml@2.9.0:
    resolution: {integrity: sha512-2AvhNX3mb8zd6Zy7INTtSpl1F15HW6Wnqj0srWlkKLcpYl/gMIMJiyuGq2KeI2YFxUPjdlB+3Lc10seMLtL4cA==}
    engines: {node: '>= 14.6'}
